name: CI

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"

      - name: Build
        run: go build -v .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: comet-panel-${{ matrix.os }}
          path: comet-panel*${{ matrix.os == 'windows-latest' && '.exe' || '' }}
